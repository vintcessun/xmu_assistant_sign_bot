<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>链接失效</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: linear-gradient(135deg, #f7efe6, #f1e1d0);
                font-family: "Microsoft YaHei", sans-serif;
                color: #402519;
                padding: 24px;
            }

            article {
                width: min(480px, 100%);
                border-radius: 24px;
                background: rgba(255, 251, 246, 0.92);
                border: 1px solid rgba(64, 37, 25, 0.08);
                padding: 32px;
                box-shadow: 0 20px 50px rgba(88, 53, 34, 0.12);
            }

            h1 {
                margin: 0 0 12px;
                font-size: 28px;
            }

            p {
                margin: 0;
                line-height: 1.8;
                color: #7a6558;
            }
        </style>
    </head>
    <body>
        <article>
            <h1>这个登录链接已失效</h1>
            <p>请回到机器人对话中重新触发指令，获取一条新的临时登录链接。</p>
        </article>
    </body>
</html>
