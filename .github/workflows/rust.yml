name: Build multi-platform releases

on:
    push:
        branches: ["master", "main"]
    pull_request:
        branches: ["master", "main"]
    workflow_dispatch:

jobs:
    # Linux builds using native runners where possible
    build-linux:
        name: Linux builds (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read
            actions: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-24.04-arm
                    - target: i686-unknown-linux-gnu
                      os: ubuntu-latest
                    - target: armv7-unknown-linux-gnueabihf
                      os: ubuntu-24.04-arm
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Prepare LLM tool config
              run: |
                  cp src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  cp src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Install Dependencies
              run: |
                  sudo apt-get update
                  T="${{ matrix.target }}"
                  if [[ "$T" == "i686"* ]]; then
                    sudo dpkg --add-architecture i386
                    sudo apt-get update
                    sudo apt-get install -y --no-install-recommends aptitude cmake gcc-multilib g++-multilib
                    sudo aptitude install -y -o Aptitude::ProblemResolver::SolutionCost='100*untrusted, 100*vulnerable' \
                      pkg-config libssl-dev:i386 libavcodec-dev:i386 libavformat-dev:i386 libavutil-dev:i386 \
                      libavdevice-dev:i386 libavfilter-dev:i386 libswresample-dev:i386 libswscale-dev:i386 \
                      libc6-dev:i386 clang libclang-dev libopencv-dev libopencv-contrib-dev python3 mold
                  elif [[ "$T" == "armv7"* ]]; then
                    sudo dpkg --add-architecture armhf
                    sudo apt-get update
                    sudo apt-get install -y --no-install-recommends aptitude cmake
                    sudo aptitude install -y -o Aptitude::ProblemResolver::SolutionCost='100*untrusted, 100*vulnerable' \
                      pkg-config libssl-dev:armhf libavcodec-dev:armhf libavformat-dev:armhf libavutil-dev:armhf \
                      libavdevice-dev:armhf libavfilter-dev:armhf libswresample-dev:armhf libswscale-dev:armhf \
                      libclang-dev libopencv-dev:armhf libopencv-contrib-dev:armhf libc6-dev:armhf \
                      gcc-arm-linux-gnueabihf python3 mold
                  else
                    # x86_64 or aarch64 native
                    sudo apt-get install -y mold clang pkg-config libssl-dev libclang-dev libopencv-dev \
                      libavcodec-dev libavformat-dev libavutil-dev libavdevice-dev libavfilter-dev \
                      libswresample-dev libswscale-dev
                  fi

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Rust Cache
              uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Configure Environment
              run: |
                  T="${{ matrix.target }}"
                  echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
                  if [[ "$T" == "i686"* ]]; then
                    echo "CFLAGS=-m32" >> $GITHUB_ENV
                    echo "CXXFLAGS=-m32" >> $GITHUB_ENV
                    echo "PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig" >> $GITHUB_ENV
                    echo "PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig" >> $GITHUB_ENV
                  elif [[ "$T" == "armv7"* ]]; then
                    echo "CFLAGS=-mfloat-abi=hard" >> $GITHUB_ENV
                    echo "CXXFLAGS=-mfloat-abi=hard" >> $GITHUB_ENV
                    echo "PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig" >> $GITHUB_ENV
                    echo "PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig" >> $GITHUB_ENV
                  fi

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }} --verbose
              env:
                  RUSTFLAGS: >-
                      -C link-arg=-fuse-ld=mold
                      ${{ contains(matrix.target, 'x86_64') && '-C target-cpu=x86-64-v3' || '' }}
                  OPENSSL_STATIC: 1
                  # Ensure bindgen can find headers for cross-arch
                  BINDGEN_EXTRA_CLANG_ARGS: >-
                      ${{ contains(matrix.target, 'i686') && '-I/usr/include/i386-linux-gnu' || '' }}
                      ${{ contains(matrix.target, 'armv7') && '-I/usr/include/arm-linux-gnueabihf' || '' }}

            - name: Rename artifact
              shell: bash
              run: |
                  mkdir -p artifacts
                  BIN_NAME="xmu_assistant_bot-${{ matrix.target }}"
                  if [ -f "target/${{ matrix.target }}/release/xmu_assistant_bot" ]; then
                      cp "target/${{ matrix.target }}/release/xmu_assistant_bot" "artifacts/${BIN_NAME}"
                  elif [ -f "target/release/xmu_assistant_bot" ]; then
                      cp "target/release/xmu_assistant_bot" "artifacts/${BIN_NAME}"
                  else
                      echo "Error: Binary not found!"
                      find target -name "xmu_assistant_bot"
                      exit 1
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/**
                  if-no-files-found: warn
                  compression-level: 6
                  overwrite: false
                  include-hidden-files: false
              env:
                  CARGO_HOME: /home/runner/.cargo
                  CARGO_INCREMENTAL: 0
                  CARGO_TERM_COLOR: always

    # Windows MSVC builds (using Windows runner)
    build-windows-msvc:
        name: Windows MSVC builds
        runs-on: windows-2025-VS2026
        permissions:
            contents: read
            actions: write
        env:
            VCPKG_ROOT: C:\vcpkg
            VCPKGRS_DYNAMIC: "1"
            # 启用微软官方备用资源镜像，极大缓解 GitHub 502/404 下载问题
            # 注意：格式为 x-azurl,URL，使用逗号分隔
            X_VCPKG_ASSET_SOURCES: "x-azurl,https://vcpkgconfdist.azureedge.net/nupkg"
        strategy:
            fail-fast: false
            matrix:
                target:
                    [
                        x86_64-pc-windows-msvc,
                        i686-pc-windows-msvc,
                        aarch64-pc-windows-msvc,
                    ]
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Cache vcpkg downloads
              uses: actions/cache@v4
              with:
                  path: C:\vcpkg\downloads
                  key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('Cargo.toml') }}
                  restore-keys: |
                      vcpkg-downloads-${{ runner.os }}-

            - name: Update vcpkg and Install OpenCV
              shell: pwsh
              run: |
                  $TRIPLET = if ("${{ matrix.target }}" -like "*x86_64*") { "x64-windows" } elseif ("${{ matrix.target }}" -like "*i686*") { "x86-windows" } else { "arm64-windows" }

                  # 增强 vcpkg 环境稳定性
                  git -C $env:VCPKG_ROOT pull

                  # 增加重试逻辑以应对网络抖动
                  $maxRetries = 3
                  $retryCount = 0
                  while ($retryCount -lt $maxRetries) {
                      Write-Host "Attempting vcpkg install (Attempt $($retryCount + 1)/$maxRetries)..."
                      vcpkg install opencv4[contrib] --triplet $TRIPLET
                      
                      if ($LASTEXITCODE -eq 0) {
                          Write-Host "Vcpkg install succeeded."
                          return
                      }

                      $retryCount++
                      if ($retryCount -lt $maxRetries) {
                          Write-Warning "Vcpkg install failed with exit code $LASTEXITCODE. Retrying in 15 seconds..."
                          Start-Sleep -Seconds 15
                      } else {
                          Write-Error "Vcpkg install failed after $maxRetries attempts."
                          exit 1
                      }
                  }

            - name: Install FFmpeg 7.1 Shared (Download or Compile)
              shell: pwsh
              run: |
                  $TARGET = "${{ matrix.target }}"
                  if (Test-Path -Path "C:\ffmpeg") { Remove-Item -Recurse -Force "C:\ffmpeg" }
                  New-Item -ItemType Directory -Path "C:\ffmpeg"

                  if ($TARGET -like "i686*") {
                    # 1. 创建临时工具目录并准备 MSVC 环境
                    $TEMP_TOOLS = "C:\temp_tools"
                    New-Item -ItemType Directory -Path $TEMP_TOOLS -Force
                    
                    # 导入 32 位 MSVC 环境变量
                    $VS_INSTALL_DIR = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
                    $VCVARS = "$VS_INSTALL_DIR\VC\Auxiliary\Build\vcvars32.bat"
                    $tmpFile = New-TemporaryFile
                    cmd /c "`"$VCVARS`" && set" > $tmpFile
                    Get-Content $tmpFile | ForEach-Object {
                        if ($_ -match "^(.*?)=(.*)$") {
                            $name = $matches[1]
                            $value = $matches[2]
                            if ($name -ieq "PATH") { $env:PATH = $value }
                            else { [System.Environment]::SetEnvironmentVariable($name, $value, "Process") }
                        }
                    }
                    Remove-Item $tmpFile

                    # 2. 在 MSYS2 内部安装工具
                    $MSYS2_PATH = "C:\msys64"
                    # 设置 MSYS2 继承父进程环境，确保能找到 cl.exe
                    $env:MSYS2_PATH_TYPE = "inherit"
                    & "$MSYS2_PATH\usr\bin\bash.exe" -lc "pacman -S --noconfirm nasm make pkgconf"

                    # 3. 下载并编译 FFmpeg
                    Invoke-WebRequest -Uri https://ffmpeg.org/releases/ffmpeg-7.1.tar.bz2 -OutFile ffmpeg.tar.bz2
                    tar -xf ffmpeg.tar.bz2
                    Set-Location ffmpeg-7.1
                    
                    # 修正 cl.exe 无法创建可执行文件的问题：显式指定 CC/CXX
                    # 增加 --enable-pic (虽然 msvc 默认 pic), 关键是确保所有组件都编译并安装
                    $CONFIG_ARGS = "--arch=x86 --target-os=win32 --toolchain=msvc --enable-shared --enable-static --disable-programs --disable-doc --cc=cl --cxx=cl --prefix=C:/ffmpeg"
                    & "$MSYS2_PATH\usr\bin\bash.exe" -lc "cd `"$PWD`" && ./configure $CONFIG_ARGS && make -j$env:NUMBER_OF_PROCESSORS && make install"

                    # 4. 卸载临时工具
                    & "$MSYS2_PATH\usr\bin\bash.exe" -lc "pacman -Rs --noconfirm nasm make pkgconf"
                    Remove-Item -Recurse -Force $TEMP_TOOLS

                    # 5. 修正 lib 路径 (MSVC 编译出来的 lib 可能在 C:\ffmpeg\bin 目录下或需要移动)
                    # configure --prefix=C:/ffmpeg 后，make install 会自动创建目录
                    if (Test-Path "C:\ffmpeg\bin\*.lib") {
                        Move-Item -Path "C:\ffmpeg\bin\*.lib" -Destination "C:\ffmpeg\lib" -Force
                    }

                    # 6. !!! 彻底清理 !!!
                    Set-Location ..
                    Remove-Item -Recurse -Force ffmpeg-7.1
                    Remove-Item -Force ffmpeg.tar.bz2
                    
                    # 还原环境变量，确保 aws-lc-sys 编译时看不到 MSYS2
                    $env:PATH = $ORIGINAL_PATH
                    $env:MSYS2_PATH_TYPE = $null
                    Write-Host "MSYS2 environment cleared. Ready for clean Rust build."
                  } else {
                      if ($TARGET -like "*aarch64*") {
                        $URL = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-winarm64-gpl-shared-7.1.zip"
                      } else {
                        $URL = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip"
                      }
                      
                      Write-Host "Downloading pre-built FFmpeg from $URL"
                      Invoke-WebRequest -Uri $URL -OutFile ffmpeg.zip
                      Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp
                      
                      $FFMPEG_EXTRACTED_DIR = Get-ChildItem -Path ffmpeg_temp -Directory | Select-Object -First 1
                      Copy-Item -Path "$($FFMPEG_EXTRACTED_DIR.FullName)\*" -Destination "C:\ffmpeg" -Recurse
                      Remove-Item -Recurse -Force ffmpeg_temp
                  }

                  # 统一配置路径
                  "C:\ffmpeg\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
                  "FFMPEG_BIN_PATH=C:\ffmpeg\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

            - name: Prepare LLM tool config
              run: |
                  Copy-Item src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  Copy-Item src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Configure environment variables for build
              shell: pwsh
              run: |
                  # 1. 自动寻找 Windows SDK 路径 (包含 ucrt 和 um)
                  $SDK_ROOT = "C:\Program Files (x86)\Windows Kits\10\Include"
                  $SDK_VERSION = (Get-ChildItem $SDK_ROOT).Name | Sort-Object {[version]$_} -Descending | Select-Object -First 1
                  $UCRT_PATH = "$SDK_ROOT\$SDK_VERSION\ucrt"
                  $UM_PATH = "$SDK_ROOT\$SDK_VERSION\um"
                  $SHARED_PATH = "$SDK_ROOT\$SDK_VERSION\shared"
                  Write-Host "UCRT path: $UCRT_PATH"

                  # 2. 自动寻找 MSVC Include 路径
                  $VS_INSTALL_DIR = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
                  $MSVC_INCLUDE = ""
                  if ($VS_INSTALL_DIR) {
                      $MSVC_TOOLS_ROOT = "$VS_INSTALL_DIR\VC\Tools\MSVC"
                      $FOUND_FILE = Get-ChildItem -Path $MSVC_TOOLS_ROOT -Filter "vcruntime.h" -Recurse | Select-Object -First 1
                      if ($FOUND_FILE) {
                          $MSVC_INCLUDE = $FOUND_FILE.DirectoryName
                      }
                  }
                  Write-Host "MSVC include path: $MSVC_INCLUDE"

                  # 3. 设置 BINDGEN_EXTRA_CLANG_ARGS (解决 crtdbg.h 找不到的问题)
                  $FFMPEG_INC = "C:\ffmpeg\include"
                  $VCPKG_INC = "$env:VCPKG_ROOT\installed\${{ contains(matrix.target, 'x86_64') && 'x64' || contains(matrix.target, 'i686') && 'x86' || 'arm64' }}-windows\\include"
                  $CLANG_ARGS = "-I`"$UCRT_PATH`" -I`"$UM_PATH`" -I`"$SHARED_PATH`" -I`"$FFMPEG_INC`" -I`"$VCPKG_INC`""
                  if ($MSVC_INCLUDE) {
                      $CLANG_ARGS += " -I`"$MSVC_INCLUDE`""
                  }
                  "BINDGEN_EXTRA_CLANG_ARGS=$CLANG_ARGS" | Out-File -FilePath $env:GITHUB_ENV -Append

                  # 4. 设置 FFmpeg 相关路径
                  "FFMPEG_DIR=C:\ffmpeg" | Out-File -FilePath $env:GITHUB_ENV -Append
                  "FFMPEG_NO_AVFFT=1" | Out-File -FilePath $env:GITHUB_ENV -Append

                  # 5. 允许跨平台编译
                  "PKG_CONFIG_ALLOW_CROSS=1" | Out-File -FilePath $env:GITHUB_ENV -Append

            - name: Install Windows MSVC toolchain
              run: |
                  rustup target add ${{ matrix.target }}
                  rustc -V
                  cargo -V

            - name: Verify OpenCV and critical libraries
              shell: pwsh
              run: |
                  $LIB_DIR = "C:\vcpkg\installed\${{ contains(matrix.target, 'x86_64') && 'x64' || contains(matrix.target, 'i686') && 'x86' || 'arm64' }}-windows\\lib"
                  # 核心 OpenCV 模块列表，完全匹配本地文件名格式
                  $LIBS = "opencv_core4", "opencv_imgcodecs4", "opencv_wechat_qrcode4", "opencv_dnn4", "opencv_imgproc4", "opencv_features2d4", "opencv_flann4", "opencv_calib3d4", "opencv_objdetect4", "opencv_video4", "opencv_ml4", "opencv_photo4"
                  Write-Host "Verifying critical libraries in $LIB_DIR"
                  foreach ($lib in $LIBS) {
                      $libPath = Join-Path $LIB_DIR "$lib.lib"
                      if (!(Test-Path $libPath)) {
                          Write-Error "CRITICAL FAILURE: Library $libPath not found. Please ensure vcpkg installed opencv4[contrib] correctly."
                          exit 1
                      }
                  }
                  Write-Host "All critical libraries verified successfully."

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }} --verbose
              env:
                  RUSTFLAGS: >-
                      -C link-arg=-fuse-ld=lld-link 
                      ${{ contains(matrix.target, 'x86_64') && '-C target-cpu=x86-64-v3' || '' }}
                      ${{ contains(matrix.target, 'aarch64') && '-C target-cpu=generic' || '' }}
                  OPENCV_LINK_LIBS: "opencv_core4,opencv_imgcodecs4,opencv_wechat_qrcode4,opencv_dnn4,opencv_imgproc4,opencv_features2d4,opencv_flann4,opencv_calib3d4,opencv_objdetect4,opencv_video4,opencv_ml4,opencv_photo4"
                  OPENCV_LINK_PATHS: "C:\\vcpkg\\installed\\${{ contains(matrix.target, 'x86_64') && 'x64' || contains(matrix.target, 'i686') && 'x86' || 'arm64' }}-windows\\lib"
                  OPENCV_INCLUDE_PATHS: "C:\\vcpkg\\installed\\${{ contains(matrix.target, 'x86_64') && 'x64' || contains(matrix.target, 'i686') && 'x86' || 'arm64' }}-windows\\include,C:\\vcpkg\\installed\\${{ contains(matrix.target, 'x86_64') && 'x64' || contains(matrix.target, 'i686') && 'x86' || 'arm64' }}-windows\\include\\opencv4"

            - name: Rename artifact
              shell: powershell
              run: |
                  New-Item -ItemType Directory -Force -Path artifacts | Out-Null
                  $BIN_NAME = "xmu_assistant_bot-${{ matrix.target }}"
                  if (Test-Path "target/${{ matrix.target }}/release/*.exe") {
                      Copy-Item "target/${{ matrix.target }}/release/*.exe" "artifacts/$BIN_NAME.exe"
                      Write-Host "Successfully copied artifacts for $BIN_NAME"
                  } else {
                      Write-Warning "No .exe binary found for $BIN_NAME (maybe build failed)"
                      Get-ChildItem -Recurse "target/${{ matrix.target }}/release"
                  }

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/**
                  if-no-files-found: warn
                  compression-level: 6
                  overwrite: false
                  include-hidden-files: false

    # macOS builds (using macOS runner)
    build-macos:
        name: macOS builds
        runs-on: ${{ matrix.target == 'x86_64-apple-darwin' && 'macos-15-intel' || 'macos-latest' }}
        strategy:
            fail-fast: false
            matrix:
                target: [x86_64-apple-darwin, aarch64-apple-darwin]
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Prepare LLM tool config
              run: |
                  cp src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  cp src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Install macOS target
              run: rustup target add ${{ matrix.target }}

            - name: Install and configure dependencies for native crates
              # Ensure openssl and ffmpeg are installed and configure environment variables for native crates
              run: |
                  # Install dependencies using Homebrew
                  # Using ffmpeg@6 because ffmpeg 7 removed some headers (like avfft.h) required by ffmpeg-sys-next
                  brew install openssl ffmpeg@6
                  brew link ffmpeg@6

                  # Configure OpenSSL environment variables
                  OPENSSL_DIR=$(brew --prefix openssl)
                  FFMPEG_DIR=$(brew --prefix ffmpeg@6)
                  echo "OPENSSL_INCLUDE_DIR=$OPENSSL_DIR/include" >> $GITHUB_ENV
                  echo "OPENSSL_LIB_DIR=$OPENSSL_DIR/lib" >> $GITHUB_ENV

                  # Configure PKG_CONFIG_PATH to include OpenSSL and FFmpeg paths
                  FFMPEG_PC_PATH=$FFMPEG_DIR/lib/pkgconfig
                  OPENSSL_PC_PATH=$OPENSSL_DIR/lib/pkgconfig

                  # Set PKG_CONFIG_PATH. Explicitly setting it should help with cross-compilation issues.
                  echo "PKG_CONFIG_PATH=$OPENSSL_PC_PATH:$FFMPEG_PC_PATH" >> $GITHUB_ENV

                  # Set CPATH and LIBRARY_PATH for clang and linker
                  echo "CPATH=$FFMPEG_DIR/include:$OPENSSL_DIR/include" >> $GITHUB_ENV
                  echo "LIBRARY_PATH=$FFMPEG_DIR/lib:$OPENSSL_DIR/lib" >> $GITHUB_ENV

            - name: Install OpenCV via Homebrew
              run: |
                  brew install opencv
            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }} --verbose
              env:
                  PKG_CONFIG_ALLOW_CROSS: 1
                  RUSTFLAGS: >-
                      ${{ matrix.target == 'aarch64-apple-darwin' && '-C target-cpu=apple-m1' || '-C target-cpu=x86-64-v3' }}

            - name: Rename artifact
              shell: bash
              run: |
                  mkdir -p artifacts
                  BIN_NAME="xmu_assistant_bot-${{ matrix.target }}"
                  # 尝试两个可能的路径
                  if [ -f "target/${{ matrix.target }}/release/xmu_assistant_bot" ]; then
                      cp target/${{ matrix.target }}/release/xmu_assistant_bot artifacts/${BIN_NAME}
                  elif [ -f "target/release/xmu_assistant_bot" ]; then
                      cp target/release/xmu_assistant_bot artifacts/${BIN_NAME}
                  else
                      echo "Error: Binary not found!"
                      find target -name "xmu_assistant_bot"
                      exit 1
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/
