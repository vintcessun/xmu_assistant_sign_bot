name: Build multi-platform releases

on:
    push:
        branches: ["master", "main"]
    pull_request:
        branches: ["master", "main"]
    workflow_dispatch:

jobs:
    # Linux cross-compilation jobs (using cross for Linux targets)
    build-linux-cross:
        name: Linux cross builds
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                target:
                    [
                        i686-unknown-linux-gnu,
                        aarch64-unknown-linux-gnu,
                        armv7-unknown-linux-gnueabihf,
                    ]
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Prepare LLM tool config
              run: |
                  cp src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  cp src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Install cross
              run: cargo install cross --force

            - name: Build release binary using cross
              run: cross build --release --target ${{ matrix.target }} --verbose
              env:
                  # Override .cargo/config.toml to prevent host-specific flags (like target-cpu=native)
                  # from being leaked into the cross-compilation environment.
                  RUSTFLAGS: ""

            - name: Rename artifact
              shell: bash
              run: |
                  mkdir -p artifacts  # 确保 artifacts 目录存在
                  BIN_NAME="xmu_assistant_bot-${{ matrix.target }}"
                  if [ -f "target/${{ matrix.target }}/release/xmu_assistant_bot" ]; then
                      cp target/${{ matrix.target }}/release/xmu_assistant_bot artifacts/${BIN_NAME}
                  else
                      echo "Warning: No binary found for ${{ matrix.target }} (maybe cross failed)"
                      ls -R target/${{ matrix.target }}/release || true
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/**
                  if-no-files-found: warn
                  compression-level: 6
                  overwrite: false
                  include-hidden-files: false
              env:
                  CARGO_HOME: /home/runner/.cargo
                  CARGO_INCREMENTAL: 0
                  CARGO_TERM_COLOR: always

    build-linux-native:
        name: Linux native builds
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                target: [x86_64-unknown-linux-gnu]
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Prepare LLM tool config
              run: |
                  cp src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  cp src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Install Dependencies
              run: |
                  sudo apt-get update
                  # Install dependencies for openssl and ffmpeg (via video-rs)
                  sudo apt-get install -y mold clang pkg-config libssl-dev libavcodec-dev libavformat-dev libavutil-dev libavdevice-dev libavfilter-dev libswresample-dev libswscale-dev
            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Rust Cache
              uses: Swatinem/rust-cache@v2

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }} --verbose
              env:
                  RUSTFLAGS: >-
                      -C link-arg=-fuse-ld=mold
                      ${{ contains(matrix.target, 'x86_64') && '-C target-cpu=x86-64-v3' || '' }}
                  OPENSSL_STATIC: 1

            - name: Rename artifact
              shell: bash
              run: |
                  mkdir -p artifacts
                  BIN_NAME="xmu_assistant_bot-${{ matrix.target }}"
                  if [ -f "target/${{ matrix.target }}/release/xmu_assistant_bot" ]; then
                      cp "target/${{ matrix.target }}/release/xmu_assistant_bot" "artifacts/${BIN_NAME}"
                  elif [ -f "target/release/xmu_assistant_bot" ]; then
                      cp "target/release/xmu_assistant_bot" "artifacts/${BIN_NAME}"
                  else
                      echo "Error: Binary not found!"
                      find target -name "xmu_assistant_bot"
                      exit 1
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/**
                  if-no-files-found: warn
                  compression-level: 6
                  overwrite: false
                  include-hidden-files: false
              env:
                  CARGO_HOME: /home/runner/.cargo
                  CARGO_INCREMENTAL: 0
                  CARGO_TERM_COLOR: always

    # Windows MSVC builds (using Windows runner)
    build-windows-msvc:
        name: Windows MSVC builds
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                target:
                    [
                        x86_64-pc-windows-msvc,
                        i686-pc-windows-msvc,
                        aarch64-pc-windows-msvc,
                    ]
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Prepare LLM tool config
              run: |
                  Copy-Item src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  Copy-Item src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Install pkg-config and FFmpeg dependencies
              shell: powershell
              run: |
                  # 1. Install pkgconfig using Chocolatey
                  choco install pkgconfig --no-progress
                  $env:Path += ";C:\ProgramData\chocolatey\bin"
                  echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

                  # 2. Map Rust target to Vcpkg triplet and install ffmpeg
                  $TRIPLET = "${{ matrix.target }}"
                  if ($TRIPLET -eq 'x86_64-pc-windows-msvc') { $VCPKG_TRIPLET = 'x64-windows' }
                  elseif ($TRIPLET -eq 'i686-pc-windows-msvc') { $VCPKG_TRIPLET = 'x86-windows' }
                  elseif ($TRIPLET -eq 'aarch64-pc-windows-msvc') { $VCPKG_TRIPLET = 'arm64-windows' }
                  else { $VCPKG_TRIPLET = $TRIPLET } # Fallback

                  Write-Host "Installing ffmpeg for Vcpkg triplet $VCPKG_TRIPLET"
                  vcpkg install ffmpeg --triplet $VCPKG_TRIPLET --recurse

                  # 3. Configure environment variables (pkg-config path)
                  # VCPKG_ROOT is typically C:\vcpkg on GitHub runners
                  $VCPKG_ROOT = "C:\vcpkg" 
                  $PKG_CONFIG_PATH = Join-Path $VCPKG_ROOT "installed\$VCPKG_TRIPLET\lib\pkgconfig"
                  Write-Host "Setting PKG_CONFIG_PATH to $PKG_CONFIG_PATH"
                  echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $env:GITHUB_ENV

            - name: Install Windows MSVC toolchain
              run: |
                  rustup target add ${{ matrix.target }}
                  rustc -V
                  cargo -V

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }} --verbose
              env:
                  RUSTFLAGS: >-
                      -C link-arg=-fuse-ld=lld-link 
                      ${{ contains(matrix.target, 'x86_64') && '-C target-cpu=x86-64-v3' || '' }}
                      ${{ contains(matrix.target, 'aarch64') && '-C target-cpu=generic' || '' }}

            - name: Rename artifact
              shell: powershell
              run: |
                  New-Item -ItemType Directory -Force -Path artifacts | Out-Null
                  $BIN_NAME = "xmu_assistant_bot-${{ matrix.target }}"
                  if (Test-Path "target/${{ matrix.target }}/release/*.exe") {
                      Copy-Item "target/${{ matrix.target }}/release/*.exe" "artifacts/$BIN_NAME.exe"
                      Write-Host "Successfully copied artifacts for $BIN_NAME"
                  } else {
                      Write-Warning "No .exe binary found for $BIN_NAME (maybe build failed)"
                      Get-ChildItem -Recurse "target/${{ matrix.target }}/release"
                  }

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/**
                  if-no-files-found: warn
                  compression-level: 6
                  overwrite: false
                  include-hidden-files: false

    # macOS builds (using macOS runner)
    build-macos:
        name: macOS builds
        runs-on: macos-latest
        strategy:
            fail-fast: false
            matrix:
                target: [x86_64-apple-darwin, aarch64-apple-darwin]
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Prepare LLM tool config
              run: |
                  cp src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  cp src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Install macOS target
              run: rustup target add ${{ matrix.target }}

            - name: Install and configure dependencies for native crates
              # Ensure openssl and ffmpeg are installed and configure environment variables for native crates
              run: |
                  # Install dependencies using Homebrew
                  # Using ffmpeg@6 because ffmpeg 7 removed some headers (like avfft.h) required by ffmpeg-sys-next
                  brew install openssl ffmpeg@6
                  brew link ffmpeg@6

                  # Configure OpenSSL environment variables
                  OPENSSL_DIR=$(brew --prefix openssl)
                  FFMPEG_DIR=$(brew --prefix ffmpeg@6)
                  echo "OPENSSL_INCLUDE_DIR=$OPENSSL_DIR/include" >> $GITHUB_ENV
                  echo "OPENSSL_LIB_DIR=$OPENSSL_DIR/lib" >> $GITHUB_ENV

                  # Configure PKG_CONFIG_PATH to include OpenSSL and FFmpeg paths
                  FFMPEG_PC_PATH=$FFMPEG_DIR/lib/pkgconfig
                  OPENSSL_PC_PATH=$OPENSSL_DIR/lib/pkgconfig

                  # Set PKG_CONFIG_PATH. Explicitly setting it should help with cross-compilation issues.
                  echo "PKG_CONFIG_PATH=$OPENSSL_PC_PATH:$FFMPEG_PC_PATH" >> $GITHUB_ENV

                  # Set CPATH and LIBRARY_PATH for clang and linker
                  echo "CPATH=$FFMPEG_DIR/include:$OPENSSL_DIR/include" >> $GITHUB_ENV
                  echo "LIBRARY_PATH=$FFMPEG_DIR/lib:$OPENSSL_DIR/lib" >> $GITHUB_ENV
            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }} --verbose
              env:
                  PKG_CONFIG_ALLOW_CROSS: 1
                  RUSTFLAGS: >-
                      ${{ matrix.target == 'aarch64-apple-darwin' && '-C target-cpu=apple-m1' || '-C target-cpu=x86-64-v3' }}

            - name: Rename artifact
              shell: bash
              run: |
                  mkdir -p artifacts
                  BIN_NAME="xmu_assistant_bot-${{ matrix.target }}"
                  # 尝试两个可能的路径
                  if [ -f "target/${{ matrix.target }}/release/xmu_assistant_bot" ]; then
                      cp target/${{ matrix.target }}/release/xmu_assistant_bot artifacts/${BIN_NAME}
                  elif [ -f "target/release/xmu_assistant_bot" ]; then
                      cp target/release/xmu_assistant_bot artifacts/${BIN_NAME}
                  else
                      echo "Error: Binary not found!"
                      find target -name "xmu_assistant_bot"
                      exit 1
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/
