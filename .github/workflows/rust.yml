name: Build multi-platform releases

on:
    push:
        branches: ["master", "main"]
    pull_request:
        branches: ["master", "main"]
    workflow_dispatch:

jobs:
    # Linux cross-compilation jobs (using cross for Linux targets)
    build-linux-cross:
        name: Linux cross builds
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                target:
                    [
                        i686-unknown-linux-gnu,
                        aarch64-unknown-linux-gnu,
                        armv7-unknown-linux-gnueabihf,
                    ]
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Create Cross.toml dynamically
              run: |
                  cat <<EOF > Cross.toml
                  [target.x86_64-unknown-linux-gnu]
                  pre-build = [
                      "apt-get update",
                      "apt-get install -y pkg-config libssl-dev mold clang libavcodec-dev libavformat-dev libavutil-dev libavdevice-dev libavfilter-dev libswresample-dev libswscale-dev libc6-dev",
                  ]

                  [target.i686-unknown-linux-gnu]
                  image = "ghcr.io/cross-rs/i686-unknown-linux-gnu:edge"
                  pre-build = [
                      "dpkg --add-architecture i386",
                      "apt-get update",
                      "apt-get install -y pkg-config libssl-dev:i386 libavcodec-dev:i386 libavformat-dev:i386 libavutil-dev:i386 libavdevice-dev:i386 libavfilter-dev:i386 libswresample-dev:i386 libswscale-dev:i386 libc6-dev:i386 clang libclang-dev",
                  ]
                  env = { BINDGEN_EXTRA_CLANG_ARGS = "-I/usr/i686-linux-gnu/include" }

                  [target.aarch64-unknown-linux-gnu]
                  image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:edge"
                  pre-build = [
                      "dpkg --add-architecture arm64",
                      "apt-get update",
                      "apt-get install -y pkg-config libssl-dev:arm64 libavcodec-dev:arm64 libavformat-dev:arm64 libavutil-dev:arm64 libavdevice-dev:arm64 libavfilter-dev:arm64 libswresample-dev:arm64 libswscale-dev:arm64 libc6-dev:arm64 clang libclang-dev",
                  ]
                  env = { BINDGEN_EXTRA_CLANG_ARGS = "-I/usr/aarch64-linux-gnu/include" }

                  [target.armv7-unknown-linux-gnueabihf]
                  image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:edge"
                  pre-build = [
                      "dpkg --add-architecture armhf",
                      "apt-get update",
                      "apt-get install -y pkg-config libssl-dev:armhf libavcodec-dev:armhf libavformat-dev:armhf libavutil-dev:armhf libavdevice-dev:armhf libavfilter-dev:armhf libswresample-dev:armhf libswscale-dev:armhf libclang-dev libc6-dev-armhf-cross",
                  ]
                  env = { BINDGEN_EXTRA_CLANG_ARGS = "-I/usr/arm-linux-gnueabihf/include" }
                  EOF

            - name: Prepare LLM tool config
              run: |
                  cp src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  cp src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Install cross
              run: cargo install cross --force

            - name: Build release binary using cross
              run: cross build --release --target ${{ matrix.target }} --verbose
              env:
                  # Override .cargo/config.toml to prevent host-specific flags (like target-cpu=native)
                  # from being leaked into the cross-compilation environment.
                  RUSTFLAGS: ""

            - name: Rename artifact
              shell: bash
              run: |
                  mkdir -p artifacts  # 确保 artifacts 目录存在
                  BIN_NAME="xmu_assistant_bot-${{ matrix.target }}"
                  if [ -f "target/${{ matrix.target }}/release/xmu_assistant_bot" ]; then
                      cp target/${{ matrix.target }}/release/xmu_assistant_bot artifacts/${BIN_NAME}
                  else
                      echo "Warning: No binary found for ${{ matrix.target }} (maybe cross failed)"
                      ls -R target/${{ matrix.target }}/release || true
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/**
                  if-no-files-found: warn
                  compression-level: 6
                  overwrite: false
                  include-hidden-files: false
              env:
                  CARGO_HOME: /home/runner/.cargo
                  CARGO_INCREMENTAL: 0
                  CARGO_TERM_COLOR: always

    build-linux-native:
        name: Linux native builds
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                target: [x86_64-unknown-linux-gnu]
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Prepare LLM tool config
              run: |
                  cp src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  cp src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Install Dependencies
              run: |
                  sudo apt-get update
                  # Install dependencies for openssl and ffmpeg (via video-rs)
                  sudo apt-get install -y mold clang pkg-config libssl-dev libavcodec-dev libavformat-dev libavutil-dev libavdevice-dev libavfilter-dev libswresample-dev libswscale-dev
            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Rust Cache
              uses: Swatinem/rust-cache@v2

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }} --verbose
              env:
                  RUSTFLAGS: >-
                      -C link-arg=-fuse-ld=mold
                      ${{ contains(matrix.target, 'x86_64') && '-C target-cpu=x86-64-v3' || '' }}
                  OPENSSL_STATIC: 1

            - name: Rename artifact
              shell: bash
              run: |
                  mkdir -p artifacts
                  BIN_NAME="xmu_assistant_bot-${{ matrix.target }}"
                  if [ -f "target/${{ matrix.target }}/release/xmu_assistant_bot" ]; then
                      cp "target/${{ matrix.target }}/release/xmu_assistant_bot" "artifacts/${BIN_NAME}"
                  elif [ -f "target/release/xmu_assistant_bot" ]; then
                      cp "target/release/xmu_assistant_bot" "artifacts/${BIN_NAME}"
                  else
                      echo "Error: Binary not found!"
                      find target -name "xmu_assistant_bot"
                      exit 1
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/**
                  if-no-files-found: warn
                  compression-level: 6
                  overwrite: false
                  include-hidden-files: false
              env:
                  CARGO_HOME: /home/runner/.cargo
                  CARGO_INCREMENTAL: 0
                  CARGO_TERM_COLOR: always

    # Windows MSVC builds (using Windows runner)
    build-windows-msvc:
        name: Windows MSVC builds
        runs-on: windows-latest
        env:
            VCPKG_ROOT: C:\vcpkg
        strategy:
            fail-fast: false
            matrix:
                target:
                    [
                        x86_64-pc-windows-msvc,
                        i686-pc-windows-msvc,
                        aarch64-pc-windows-msvc,
                    ]
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Install FFmpeg 7.1 Shared (Download or Compile)
              shell: pwsh
              run: |
                  $TARGET = "${{ matrix.target }}"
                  if (Test-Path -Path "C:\ffmpeg") { Remove-Item -Recurse -Force "C:\ffmpeg" }
                  New-Item -ItemType Directory -Path "C:\ffmpeg"

                  if ($TARGET -like "i686*") {
                      Write-Host "Target is i686. Starting minimal FFmpeg 7.1 compilation for Win32..."
                      
                      # 1. 安装 MSYS2 编译工具和 MinGW GCC (为了修复 aws-lc-sys)
                      $MSYS2_PATH = "C:\msys64"
                      & "$MSYS2_PATH\usr\bin\bash.exe" -lc "pacman -S --noconfirm nasm make pkgconf mingw-w64-i686-gcc"

                      # 2. 下载并解压 FFmpeg 源码
                      Invoke-WebRequest -Uri https://ffmpeg.org/releases/ffmpeg-7.1.tar.bz2 -OutFile ffmpeg.tar.bz2
                      tar -xf ffmpeg.tar.bz2
                      Set-Location ffmpeg-7.1

                      # 3. 编译配置 (针对 Win32 使用 MSVC 工具链)
                      # 设置 MSYS2_PATH_TYPE=inherit 确保 MSYS2 继承 Windows 的 PATH (包含 cl.exe)
                      $env:MSYS2_PATH_TYPE = "inherit"
                      $env:CHERE_INVOKING = "1"
                      $CONFIG_ARGS = "--arch=x86 --target-os=win32 --toolchain=msvc --enable-shared --disable-static --disable-programs --disable-doc"
                      & "$MSYS2_PATH\usr\bin\bash.exe" -lc "cd `"$PWD`" && ./configure $CONFIG_ARGS && make -j$(nproc)"

                      # 4. 将产物移动到 C:\ffmpeg
                      New-Item -ItemType Directory -Path "C:\ffmpeg\lib"
                      New-Item -ItemType Directory -Path "C:\ffmpeg\include"
                      New-Item -ItemType Directory -Path "C:\ffmpeg\bin"
                      
                      Copy-Item -Path "libav*/*.lib", "libsw*/*.lib" -Destination "C:\ffmpeg\lib"
                      Copy-Item -Path "libav*/*.h", "libsw*/*.h" -Destination "C:\ffmpeg\include" -Recurse
                      Copy-Item -Path "libav*/*.dll", "libsw*/*.dll" -Destination "C:\ffmpeg\bin"

                      Set-Location ..
                      
                      # 为 i686 增加汇编器路径支持
                      "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
                      
                      # 彻底清理编译环境，防止干扰后续 MSVC 构建环境配置
                      $env:MSYS2_PATH_TYPE = $null
                      $env:CHERE_INVOKING = $null
                  } else {
                      if ($TARGET -like "*aarch64*") {
                        $URL = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-winarm64-gpl-shared-7.1.zip"
                      } else {
                        $URL = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip"
                      }
                      
                      Write-Host "Downloading pre-built FFmpeg from $URL"
                      Invoke-WebRequest -Uri $URL -OutFile ffmpeg.zip
                      Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp
                      
                      $FFMPEG_EXTRACTED_DIR = Get-ChildItem -Path ffmpeg_temp -Directory | Select-Object -First 1
                      # 移动内容到 C:\ffmpeg
                      Copy-Item -Path "$($FFMPEG_EXTRACTED_DIR.FullName)\*" -Destination "C:\ffmpeg" -Recurse
                  }

                  # 统一配置路径
                  "C:\ffmpeg\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
                  "FFMPEG_BIN_PATH=C:\ffmpeg\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

            - name: Set up MSVC (x86) for i686 target
              if: matrix.target == 'i686-pc-windows-msvc'
              uses: ilammy/msvc-dev-cmd@v1
              with:
                  arch: x86

            - name: Prepare LLM tool config
              run: |
                  Copy-Item src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  Copy-Item src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Configure environment variables for build
              shell: pwsh
              run: |
                  # 1. 自动寻找 Windows SDK UCRT 路径
                  $SDK_ROOT = "C:\Program Files (x86)\Windows Kits\10\Include"
                  $SDK_VERSION = (Get-ChildItem $SDK_ROOT).Name | Sort-Object {[version]$_} -Descending | Select-Object -First 1
                  $UCRT_PATH = "$SDK_ROOT\$SDK_VERSION\ucrt"
                  Write-Host "UCRT path: $UCRT_PATH"

                  # 2. 自动寻找 MSVC Include 路径 (寻找 vcruntime.h)
                  $VS_INSTALL_DIR = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
                  $MSVC_INCLUDE = ""
                  if ($VS_INSTALL_DIR) {
                      $MSVC_TOOLS_ROOT = "$VS_INSTALL_DIR\VC\Tools\MSVC"
                      # 直接搜索 vcruntime.h 所在的最深目录
                      $FOUND_FILE = Get-ChildItem -Path $MSVC_TOOLS_ROOT -Filter "vcruntime.h" -Recurse | Select-Object -First 1
                      if ($FOUND_FILE) {
                          $MSVC_INCLUDE = $FOUND_FILE.DirectoryName
                      }
                  }
                  Write-Host "MSVC include path: $MSVC_INCLUDE"

                  # 3. 设置 BINDGEN_EXTRA_CLANG_ARGS
                  # 必须包含 UCRT, MSVC 和 FFMPEG 头文件
                  $FFMPEG_INC = "C:\ffmpeg\include"
                  $CLANG_ARGS = "-I`"$UCRT_PATH`" -I`"$FFMPEG_INC`""
                  if ($MSVC_INCLUDE) {
                      $CLANG_ARGS += " -I`"$MSVC_INCLUDE`""
                  }
                  "BINDGEN_EXTRA_CLANG_ARGS=$CLANG_ARGS" | Out-File -FilePath $env:GITHUB_ENV -Append

                  # 4. 设置 FFmpeg 相关路径 (直接使用 C:\ffmpeg 提升可靠性)
                  $FFMPEG_ROOT = "C:\ffmpeg"
                  $FFMPEG_BIN = "C:\ffmpeg\bin"
                  $FFMPEG_INC = "C:\ffmpeg\include"
                  $FFMPEG_LIB = "C:\ffmpeg\lib"

                  "FFMPEG_DIR=$FFMPEG_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
                  "FFMPEG_NO_AVFFT=1" | Out-File -FilePath $env:GITHUB_ENV -Append

                  # 5. 修复 INCLUDE 和 LIB 环境变量 (追加模式)
                  $CURRENT_INCLUDE = if ($env:INCLUDE) { $env:INCLUDE } else { "" }
                  "INCLUDE=$FFMPEG_INC;$MSVC_INCLUDE;$CURRENT_INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Append

                  $LIB_PATHS = "C:\ffmpeg\lib;C:\ffmpeg\lib\x64"
                  $CURRENT_LIB = if ($env:LIB) { $env:LIB } else { "" }
                  "LIB=$LIB_PATHS;$CURRENT_LIB" | Out-File -FilePath $env:GITHUB_ENV -Append

                  # 6. 允许跨平台编译
                  "PKG_CONFIG_ALLOW_CROSS=1" | Out-File -FilePath $env:GITHUB_ENV -Append

                  # 输出调试信息
                  Write-Host "FFmpeg root path: $FFMPEG_ROOT"
                  Write-Host "FFmpeg bin path: $FFMPEG_BIN"
                  Write-Host "FFmpeg include path: $FFMPEG_INC"
                  Write-Host "FFmpeg lib path: $LIB_PATHS"
                  Write-Host "Set BINDGEN_EXTRA_CLANG_ARGS: $CLANG_ARGS"

            - name: Install Windows MSVC toolchain
              run: |
                  rustup target add ${{ matrix.target }}
                  rustc -V
                  cargo -V

            - name: Install NASM
              if: matrix.target == 'i686-pc-windows-msvc'
              uses: ilammy/setup-nasm@v1

            - name: Install CMake
              if: matrix.target == 'i686-pc-windows-msvc'
              uses: jwlawson/actions-setup-cmake@v2

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }} --verbose
              env:
                  # 恢复干净的编译环境
                  CMAKE_GENERATOR_PLATFORM: ${{ matrix.target == 'i686-pc-windows-msvc' && 'Win32' || '' }}
                  # 强制修复 aws-lc-sys/cc-rs 在 i686 MSVC 下错误使用 -std:c99 的问题
                  CMAKE_C_FLAGS: ${{ matrix.target == 'i686-pc-windows-msvc' && '/std:c11' || '' }}
                  CMAKE_CXX_FLAGS: ${{ matrix.target == 'i686-pc-windows-msvc' && '/std:c11' || '' }}
                  RUSTFLAGS: >-
                      -C link-arg=-fuse-ld=lld-link 
                      ${{ contains(matrix.target, 'x86_64') && '-C target-cpu=x86-64-v3' || '' }}
                      ${{ contains(matrix.target, 'aarch64') && '-C target-cpu=generic' || '' }}

            - name: Rename artifact
              shell: powershell
              run: |
                  New-Item -ItemType Directory -Force -Path artifacts | Out-Null
                  $BIN_NAME = "xmu_assistant_bot-${{ matrix.target }}"
                  if (Test-Path "target/${{ matrix.target }}/release/*.exe") {
                      Copy-Item "target/${{ matrix.target }}/release/*.exe" "artifacts/$BIN_NAME.exe"
                      Write-Host "Successfully copied artifacts for $BIN_NAME"
                  } else {
                      Write-Warning "No .exe binary found for $BIN_NAME (maybe build failed)"
                      Get-ChildItem -Recurse "target/${{ matrix.target }}/release"
                  }

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/**
                  if-no-files-found: warn
                  compression-level: 6
                  overwrite: false
                  include-hidden-files: false

    # macOS builds (using macOS runner)
    build-macos:
        name: macOS builds
        runs-on: ${{ matrix.target == 'x86_64-apple-darwin' && 'macos-15-intel' || 'macos-latest' }}
        strategy:
            fail-fast: false
            matrix:
                target: [x86_64-apple-darwin, aarch64-apple-darwin]
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Prepare LLM tool config
              run: |
                  cp src/api/llm/tool/config-template.rs src/api/llm/tool/config.rs
                  cp src/api/llm/chat/config-template.rs src/api/llm/chat/config.rs

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
                  components: rustfmt, clippy

            - name: Install macOS target
              run: rustup target add ${{ matrix.target }}

            - name: Install and configure dependencies for native crates
              # Ensure openssl and ffmpeg are installed and configure environment variables for native crates
              run: |
                  # Install dependencies using Homebrew
                  # Using ffmpeg@6 because ffmpeg 7 removed some headers (like avfft.h) required by ffmpeg-sys-next
                  brew install openssl ffmpeg@6
                  brew link ffmpeg@6

                  # Configure OpenSSL environment variables
                  OPENSSL_DIR=$(brew --prefix openssl)
                  FFMPEG_DIR=$(brew --prefix ffmpeg@6)
                  echo "OPENSSL_INCLUDE_DIR=$OPENSSL_DIR/include" >> $GITHUB_ENV
                  echo "OPENSSL_LIB_DIR=$OPENSSL_DIR/lib" >> $GITHUB_ENV

                  # Configure PKG_CONFIG_PATH to include OpenSSL and FFmpeg paths
                  FFMPEG_PC_PATH=$FFMPEG_DIR/lib/pkgconfig
                  OPENSSL_PC_PATH=$OPENSSL_DIR/lib/pkgconfig

                  # Set PKG_CONFIG_PATH. Explicitly setting it should help with cross-compilation issues.
                  echo "PKG_CONFIG_PATH=$OPENSSL_PC_PATH:$FFMPEG_PC_PATH" >> $GITHUB_ENV

                  # Set CPATH and LIBRARY_PATH for clang and linker
                  echo "CPATH=$FFMPEG_DIR/include:$OPENSSL_DIR/include" >> $GITHUB_ENV
                  echo "LIBRARY_PATH=$FFMPEG_DIR/lib:$OPENSSL_DIR/lib" >> $GITHUB_ENV
            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }} --verbose
              env:
                  PKG_CONFIG_ALLOW_CROSS: 1
                  RUSTFLAGS: >-
                      ${{ matrix.target == 'aarch64-apple-darwin' && '-C target-cpu=apple-m1' || '-C target-cpu=x86-64-v3' }}

            - name: Rename artifact
              shell: bash
              run: |
                  mkdir -p artifacts
                  BIN_NAME="xmu_assistant_bot-${{ matrix.target }}"
                  # 尝试两个可能的路径
                  if [ -f "target/${{ matrix.target }}/release/xmu_assistant_bot" ]; then
                      cp target/${{ matrix.target }}/release/xmu_assistant_bot artifacts/${BIN_NAME}
                  elif [ -f "target/release/xmu_assistant_bot" ]; then
                      cp target/release/xmu_assistant_bot artifacts/${BIN_NAME}
                  else
                      echo "Error: Binary not found!"
                      find target -name "xmu_assistant_bot"
                      exit 1
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: xmu_assistant_bot-${{ matrix.target }}
                  path: artifacts/
