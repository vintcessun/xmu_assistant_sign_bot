name: Auto Sync from Upstream

on:
    schedule:
        - cron: "0 2 * * *" # 每天凌晨2点执行
    workflow_dispatch: # 支持手动点击按钮触发

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Private Repo
              uses: actions/checkout@v4
              with:
                  # 注意：需在 Settings > Secrets 中配置名为 PAT_TOKEN 的个人访问令牌
                  token: ${{ secrets.PAT_TOKEN }}
                  fetch-depth: 0

            - name: Configure Git
              run: |
                  git config --global user.name "Sync Bot"
                  git config --global user.email "bot@github.com"

            - name: Sync and Skip CI
              run: |
                  # 1. 添加上游并拉取
                  git remote add upstream https://github.com/vintcessun/xmu_assistant_bot.git
                  git fetch upstream master

                  # 2. 尝试合并
                  # 使用 --allow-unrelated-histories 解决首次同步问题
                  # 使用 -m 确保 Commit Message 包含 [skip ci]，防止挤占 Action 额度
                  if ! git merge upstream/master --allow-unrelated-histories --no-edit -m "chore: sync upstream [skip ci]"; then
                    echo "Conflict detected, attempting to ignore .github/workflows changes..."
                    
                    # 强制忽略 .github/workflows 目录下的所有冲突，保留本地状态
                    # 如果本地删除了，则继续保持删除；如果本地修改了，则保留本地修改
                    git checkout --ours .github/workflows/ || true
                    
                    # 针对那些在 HEAD 中被删除但在 upstream 中被修改的文件，checkout --ours 可能无法直接处理
                    # 我们需要将这些处于冲突状态的 .github/workflows 文件从暂存区移除（或标记为已解决）
                    git add .github/workflows/ || true
                    
                    # 尝试继续提交合并结果
                    if ! git commit -m "chore: sync upstream and ignore workflow conflicts [skip ci]"; then
                        echo "Error: Manual intervention still required after attempting to fix workflow conflicts."
                        exit 1
                    fi
                  fi

                  echo "Merge successful, cleaning up upstream workflows and pushing to private..."
                  # 再次确保除了当前同步脚本外，不保留其他上游带过来的工作流（如果有的话）
                  find .github/workflows/ -maxdepth 1 -type f -name "*.yml" -not -name "sync_upstream.yml" -print0 | xargs -0 -r git rm -f --ignore-unmatch || true

                  # 如果有删除操作，需要 commit
                  if ! git diff --staged --quiet; then
                    git commit -m "chore: cleanup workflows [skip ci]" || true
                  fi

                  git push origin main
